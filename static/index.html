<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Bus Tracker</title>
    <link rel="icon" href="/static/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#FFCC00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BusCH">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-stone-50 font-sans min-h-screen">
    <div class="max-w-lg mx-auto px-4 py-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-stone-800">🚌 Swiss Bus Tracker</h1>
            <button id="refresh-all-btn" class="text-sm px-3 py-1.5 bg-stone-200 hover:bg-stone-300 rounded-lg text-stone-700 transition">
                Rafraîchir
            </button>
        </div>

        <!-- Search -->
        <div class="relative mb-4">
            <input id="stop-search" type="text" placeholder="Rechercher un arrêt…"
                   class="w-full px-4 py-3 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-400 bg-white text-stone-800">
            <div id="search-dropdown" class="absolute z-10 w-full bg-white border border-stone-200 rounded-xl mt-1 shadow-lg hidden max-h-60 overflow-y-auto"></div>
        </div>

        <!-- Add favorite form -->
        <div id="add-fav-form" class="bg-white rounded-xl shadow-sm p-4 mb-6 hidden">
            <h2 class="text-sm font-semibold text-stone-600 mb-3">Ajouter un favori</h2>
            <div class="space-y-2">
                <input id="fav-stop-name" type="text" readonly
                       class="w-full px-3 py-2 bg-stone-100 border border-stone-200 rounded-lg text-stone-700 text-sm">
                <input id="fav-stop-ref" type="hidden">
                <div class="flex gap-2">
                    <input id="fav-line" type="text" placeholder="Ligne (optionnel)"
                           class="flex-1 px-3 py-2 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                    <input id="fav-direction" type="text" placeholder="Direction contient… (optionnel)"
                           class="flex-1 px-3 py-2 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                </div>
                <button id="add-fav-btn"
                        class="w-full py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-medium transition">
                    Ajouter
                </button>
            </div>
        </div>

        <!-- Favorites list -->
        <div id="favorites-list" class="space-y-4"></div>

        <!-- Empty state -->
        <div id="empty-state" class="text-center py-12 text-stone-400">
            <p class="text-lg mb-1">Aucun favori</p>
            <p class="text-sm">Recherchez un arrêt pour commencer</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
